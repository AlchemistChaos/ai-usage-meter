name: Release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Signing and notarization are optional: without the secrets the job
      # still produces an ad-hoc signed DMG, it just isn't Gatekeeper-clean.
      - name: Check signing secrets
        id: secrets
        run: |
          if [[ -n "${{ secrets.CSC_LINK }}" ]]; then
            echo "signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "signing=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No signing secrets — producing an unsigned build."
          fi

      - name: Import Developer ID certificate
        if: steps.secrets.outputs.signing == 'true'
        env:
          CERT: ${{ secrets.CSC_LINK }}
          CERT_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          echo "$CERT" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12
          echo "AIMETER_SIGN_IDENTITY=$(security find-identity -v -p codesigning \
            | grep 'Developer ID Application' | head -1 \
            | sed -E 's/.*"(.*)"/\1/')" >> "$GITHUB_ENV"

      - name: Build app
        run: ./build-app.sh release

      - name: Package DMG
        run: |
          mkdir -p dist/stage
          cp -R "AI Meter.app" dist/stage/
          ln -s /Applications dist/stage/Applications
          hdiutil create -volname "AI Meter" -srcfolder dist/stage \
            -ov -format UDZO "dist/AIMeter-${{ steps.v.outputs.version }}.dmg"

      - name: Notarize and staple
        if: steps.secrets.outputs.signing == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG="dist/AIMeter-${{ steps.v.outputs.version }}.dmg"
          # Sign the DMG itself so the staple sticks to the download.
          codesign --force --sign "$AIMETER_SIGN_IDENTITY" --timestamp "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$DMG"
          spctl -a -vv -t install "$DMG" || true

      - name: Checksum
        id: sum
        run: |
          DMG="dist/AIMeter-${{ steps.v.outputs.version }}.dmg"
          echo "sha256=$(shasum -a 256 "$DMG" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ### Install

            Download the DMG below and drag AI Meter to Applications.

            `sha256: ${{ steps.sum.outputs.sha256 }}`
